<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Thrive - Referral</title>
  <meta name="google-play-app" content="app-id=com.thriveinitiative.app">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #DB8633 0%, #324E58 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #324E58; margin-bottom: 12px; font-size: 24px; }
    p { color: #666; margin-bottom: 12px; line-height: 1.6; font-size: 15px; }
    .btn {
      display: inline-block;
      margin: 8px;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary {
      background: #DB8633;
      color: white;
      margin-top: 20px;
    }
    .btn-secondary {
      background: #F5F5FA;
      color: #324E58;
      border: 2px solid #E2E8F0;
    }
    .loading { color: #999; font-size: 14px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌱</div>
    <h1>Join Thrive</h1>
    <p>A friend invited you! Get exclusive discounts while supporting local causes.</p>
    <a href="#" id="appLink" class="btn btn-primary" style="display: none;">Open in Thrive App</a>
    <p id="loading" class="loading">Opening the Thrive app...</p>
    <div id="downloadSection" style="display: none;">
      <p style="margin-top: 24px; margin-bottom: 8px;">Don't have the app yet?</p>
      <a href="https://apps.apple.com/app/thrive-app" class="btn btn-secondary" id="iosLink">Download for iPhone</a>
      <a href="https://play.google.com/store/apps/details?id=com.thriveinitiative.app" class="btn btn-secondary" id="androidLink">Download for Android</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get('ref') || '';

    // Build deep link - opens app if installed
    const deepLink = ref
      ? `thriveapp://signup?ref=${encodeURIComponent(ref)}`
      : 'thriveapp://signup';

    function showFallback() {
      document.getElementById('loading').style.display = 'none';
      const appLink = document.getElementById('appLink');
      const downloadSection = document.getElementById('downloadSection');
      if (appLink) {
        appLink.href = deepLink;
        appLink.textContent = 'Open in Thrive App';
        appLink.style.display = 'inline-block';
      }
      if (downloadSection) downloadSection.style.display = 'block';
    }

    // Try to open the app
    function openApp() {
      window.location.href = deepLink;
      // Show fallback after 2s (user likely doesn't have app)
      setTimeout(showFallback, 2000);
    }

    // Detect if we're in a mobile browser (app links work better)
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile && ref) {
      openApp();
    } else {
      // Desktop or no ref - show options immediately
      showFallback();
    }
  </script>
</body>
</html>
